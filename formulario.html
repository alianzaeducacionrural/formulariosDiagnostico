<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Diagnóstico</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/forms.css?v=6">
</head>
<body>
<main class="container">
  <section class="card form-card">
    <h1 id="form-title">Cargando…</h1>
    <div id="form-description" class="form-description"></div>

    <form id="formPrincipal" method="POST">
      <input type="hidden" id="form-action" value="">

      <label>Nombre</label>
      <input type="text" name="nombre" id="nombre" required>

      <div id="cargo-container"></div>
      <div id="ubicacion-container"></div>

      <h3>Estrategias</h3>
      <div class="estrategias" id="estrategias-container"></div>

      <div id="recomendaciones-container"></div>

      <div class="form-actions">
        <button type="button" onclick="abrirModal()">Enviar</button>
      </div>
    </form>
  </section>
</main>

<div id="modalConfirmacion" class="modal">
  <div class="modal-box">
    <h3>Confirmar envío</h3>
    <div class="resumen">
      <div class="resumen-item">
        <span class="label">Municipio</span>
        <span id="resumenMunicipio" class="valor"></span>
      </div>
      <div class="resumen-item">
        <span class="label">Institución Educativa</span>
        <span id="resumenInstitucion" class="valor"></span>
      </div>
    </div>
    <p class="nota">Una vez enviada la información no podrá ser modificada.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" onclick="confirmarEnvio()">Sí, enviar</button>
    </div>
  </div>
</div>

<!-- Loader de envío -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Enviando formulario…</p>
  </div>
</div>

<!-- Loader de carga inicial (visible por defecto) -->
<div id="pageLoader" class="loading-overlay" style="display:flex">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Cargando información…</p>
  </div>
</div>

<script src="js/config.js?v=6"></script>
<script src="js/formulario.js?v=6"></script>
</body>
</html>
